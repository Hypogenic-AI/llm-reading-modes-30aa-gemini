idea:
  title: '''Modes'' in LLM Reading'
  domain: artificial_intelligence
  hypothesis: 'Large language models (LLMs) can detect various ''modes'' in text,
    such as whether text is dictated, written by another LLM, or influenced by keyboard
    layout through characteristic mistakes. This research asks: What other ''modes''
    are LLMs detecting, and can ''mode'' be isolated as a latent variable in LLM interpretation
    of text?

    '
  background:
    description: 'LLMs can tell when you''re dictating. They can tell when another
      LLM is writing. They can tell what kind of keyboard layout you''re using over
      enough text by the mistakes you make. What other ''modes'' are LLMs detecting?
      Can we isolate ''mode'' as a latent variable in LLM interpretation of text?

      '
